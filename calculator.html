<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>計算機</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; font-family: 'Segoe UI', Arial, sans-serif;
    background: #e8ecf1;
  }
  .calculator {
    background: #fff; border-radius: 16px; padding: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 340px;
  }
  .calculator.scientific { width: 400px; }
  .display {
    background: #f5f7fa; border-radius: 10px; padding: 16px 20px;
    margin-bottom: 16px; text-align: right; min-height: 80px;
    border: 1px solid #e0e4ea;
  }
  .display .expr { color: #888; font-size: 16px; min-height: 24px; word-break: break-all; }
  .display .result { color: #222; font-size: 32px; font-weight: bold; min-height: 40px; word-break: break-all; }
  .toggle-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .toggle-btn {
    background: #e8ecf1; color: #333; border: 1px solid #d0d5dd;
    padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: background 0.2s;
  }
  .toggle-btn:hover { background: #dce0e6; }
  button {
    padding: 14px 0; border: none; border-radius: 8px;
    font-size: 18px; cursor: pointer; transition: all 0.15s;
    background: #f0f2f5; color: #333; border: 1px solid #e0e4ea;
  }
  button:hover { background: #e4e7ec; }
  button:active { transform: scale(0.95); }
  .sci-btn { background: #eef0f7; color: #5a6a8a; font-size: 14px; border-color: #dce0ea; }
  .fn-btn { background: #e8edf5; color: #4a7ab5; }
  .op-btn { background: #f8f3e0; color: #b8860b; border-color: #ede4c8; }
  .eq-btn { background: #4a90d9; color: #fff; border-color: #3a7bc8; }
  .eq-btn:hover { background: #3a7bc8; }
  .clr-btn { background: #fde8e8; color: #c0392b; border-color: #f5d0d0; }
  .std-layout {
    display: grid; gap: 8px;
    grid-template-columns: 1fr 1fr 1fr 1fr 70px;
    grid-template-rows: auto 1fr auto;
    grid-template-areas:
      "top top top top top"
      "num num num num ops"
      "num num num num eq";
  }
  .top-row {
    display: grid; gap: 8px; grid-area: top;
    grid-template-columns: 1fr 1fr 1fr 1fr;
  }
  .num-pad {
    display: grid; gap: 8px; grid-area: num;
    grid-template-columns: 1fr 1fr 1fr;
  }
  .num-pad .zero { grid-column: 1 / 3; }
  .right-col {
    display: grid; gap: 8px; grid-area: ops;
    grid-template-rows: repeat(4, 1fr);
  }
  .equal-row { grid-area: eq; display: grid; }
  .equal-row button { height: 100%; min-height: 56px; }
  .sci-layout {
    display: grid; gap: 8px;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(7, 1fr);
    grid-template-areas:
      "sqr   cube  pow   log   ln"
      "sqrt  cbrt  sin   cos   tan"
      "parL  parR  fact  inv   pi"
      "s7    s8    s9    clr   back"
      "s4    s5    s6    mul   div"
      "s1    s2    s3    add   sub"
      "s0    dot   neg   eq    pct";
  }
  .sci-layout button {
    padding: 0; width: 100%; height: 100%; min-height: 50px;
    display: flex; align-items: center; justify-content: center;
  }
</style>
</head>
<body>
<div class="calculator" id="calc">
  <div class="toggle-bar">
    <span style="color:#889;font-size:14px;" id="modeLabel">標準</span>
    <button class="toggle-btn" id="modeToggle" onclick="toggleMode()">工程模式</button>
  </div>
  <div class="display">
    <div class="expr" id="expr"></div>
    <div class="result" id="result">0</div>
  </div>
  <div class="buttons" id="buttons"></div>
</div>
<script>
const stdTop = [
  { t:'C',   c:'clr-btn', a:'clear' },
  { t:'⌫',   c:'fn-btn',  a:'backspace' },
  { t:'%',   c:'fn-btn',  a:'percent' },
  { t:'±',   c:'fn-btn',  a:'neg' },
];
const stdNum = [
  { t:'7', c:'', a:'7' }, { t:'8', c:'', a:'8' }, { t:'9', c:'', a:'9' },
  { t:'4', c:'', a:'4' }, { t:'5', c:'', a:'5' }, { t:'6', c:'', a:'6' },
  { t:'1', c:'', a:'1' }, { t:'2', c:'', a:'2' }, { t:'3', c:'', a:'3' },
  { t:'0', c:'zero', a:'0' }, { t:'.', c:'', a:'.' },
];
const stdOps = [
  { t:'÷', c:'op-btn', a:'/' },
  { t:'×', c:'op-btn', a:'*' },
  { t:'−', c:'op-btn', a:'-' },
  { t:'+', c:'op-btn', a:'+' },
];
const stdEq = [{ t:'=', c:'eq-btn', a:'=' }];

const sciBtns = [
  { t:'x²',  c:'sci-btn', a:'sqr' },
  { t:'x³',  c:'sci-btn', a:'cube' },
  { t:'xⁿ',  c:'sci-btn', a:'^' },
  { t:'log', c:'sci-btn', a:'log' },
  { t:'ln',  c:'sci-btn', a:'ln' },
  { t:'√',   c:'sci-btn', a:'sqrt' },
  { t:'∛',   c:'sci-btn', a:'cbrt' },
  { t:'sin', c:'sci-btn', a:'sin' },
  { t:'cos', c:'sci-btn', a:'cos' },
  { t:'tan', c:'sci-btn', a:'tan' },
  { t:'(',   c:'sci-btn', a:'(' },
  { t:')',   c:'sci-btn', a:')' },
  { t:'!',   c:'sci-btn', a:'fact' },
  { t:'1/x', c:'sci-btn', a:'inv' },
  { t:'π',   c:'sci-btn', a:'pi' },
  { t:'7',   c:'', a:'7' },
  { t:'8',   c:'', a:'8' },
  { t:'9',   c:'', a:'9' },
  { t:'C',   c:'clr-btn', a:'clear' },
  { t:'⌫',   c:'fn-btn',  a:'backspace' },
  { t:'4',   c:'', a:'4' },
  { t:'5',   c:'', a:'5' },
  { t:'6',   c:'', a:'6' },
  { t:'×',   c:'op-btn', a:'*' },
  { t:'÷',   c:'op-btn', a:'/' },
  { t:'1',   c:'', a:'1' },
  { t:'2',   c:'', a:'2' },
  { t:'3',   c:'', a:'3' },
  { t:'+',   c:'op-btn', a:'+' },
  { t:'−',   c:'op-btn', a:'-' },
  { t:'0',   c:'', a:'0' },
  { t:'.',   c:'', a:'.' },
  { t:'±',   c:'fn-btn', a:'neg' },
  { t:'=',   c:'eq-btn', a:'=' },
  { t:'%',   c:'fn-btn', a:'percent' },
];
const sciArea = {
  sqr:'sqr', cube:'cube', '^':'pow', log:'log', ln:'ln',
  sqrt:'sqrt', cbrt:'cbrt', sin:'sin', cos:'cos', tan:'tan',
  '(':'parL', ')':'parR', fact:'fact', inv:'inv', pi:'pi',
  '7':'s7', '8':'s8', '9':'s9', clear:'clr', backspace:'back',
  '4':'s4', '5':'s5', '6':'s6', '*':'mul', '/':'div',
  '1':'s1', '2':'s2', '3':'s3', '+':'add', '-':'sub',
  '0':'s0', '.':'dot', neg:'neg', '=':'eq', percent:'pct',
};

let isScientific = false;
let currentInput = '';
let expression = '';
let result = '0';
let justEvaluated = false;

const exprEl = document.getElementById('expr');
const resultEl = document.getElementById('result');
const buttonsEl = document.getElementById('buttons');
const calcEl = document.getElementById('calc');
const modeLabel = document.getElementById('modeLabel');

function btn(b) {
  return `<button class="${b.c}" data-action="${b.a}">${b.t}</button>`;
}

function renderButtons() {
  if (!isScientific) {
    buttonsEl.innerHTML = `
      <div class="std-layout">
        <div class="top-row">${stdTop.map(btn).join('')}</div>
        <div class="num-pad">${stdNum.map(btn).join('')}</div>
        <div class="right-col">${stdOps.map(btn).join('')}</div>
        <div class="equal-row">${stdEq.map(btn).join('')}</div>
      </div>`;
  } else {
    const html = sciBtns.map(b =>
      `<button class="${b.c}" data-action="${b.a}" style="grid-area:${sciArea[b.a]}">${b.t}</button>`
    ).join('');
    buttonsEl.innerHTML = `<div class="btn-grid sci-layout">${html}</div>`;
  }
}

function toggleMode() {
  isScientific = !isScientific;
  calcEl.classList.toggle('scientific', isScientific);
  document.getElementById('modeToggle').textContent = isScientific ? '標準模式' : '工程模式';
  modeLabel.textContent = isScientific ? '工程' : '標準';
  renderButtons();
}

function updateDisplay() {
  exprEl.textContent = expression;
  resultEl.textContent = result;
}

function factorial(n) {
  if (n < 0) return NaN;
  if (n === 0 || n === 1) return 1;
  let r = 1;
  for (let i = 2; i <= n; i++) r *= i;
  return r;
}

function calcExpr(e) {
  let s = e.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-');
  s = s.replace(/(\d+)!/g, (_, n) => factorial(parseFloat(n)));
  return parseFloat(Function('"use strict"; return (' + s + ')')().toFixed(10));
}

function handleAction(action) {
  if (action === 'clear') {
    currentInput = ''; expression = ''; result = '0'; justEvaluated = false;
  } else if (action === 'backspace') {
    if (justEvaluated) return;
    currentInput = currentInput.slice(0, -1);
    expression = expression.slice(0, -1);
  } else if (action === 'neg') {
    if (currentInput === '' || justEvaluated) return;
    let m = currentInput.match(/-?[\d.]+$/);
    if (m) {
      const neg = -parseFloat(m[0]);
      currentInput = currentInput.slice(0, m.index) + neg;
      expression = currentInput;
    }
  } else if (action === 'percent') {
    if (currentInput === '') return;
    try {
      const val = calcExpr(currentInput) / 100;
      result = String(val); currentInput = String(val); expression = currentInput;
    } catch(e) {}
    justEvaluated = true;
  } else if (action === '=') {
    if (currentInput === '') return;
    try {
      const val = calcExpr(currentInput);
      result = String(val); expression = currentInput + ' ='; currentInput = String(val);
    } catch(e) { result = '錯誤'; }
    justEvaluated = true;
  } else if (['sin','cos','tan','log','ln','sqrt','cbrt','sqr','cube','inv','abs','exp'].includes(action)) {
    if (justEvaluated && currentInput) expression = currentInput;
    let val = parseFloat(currentInput) || 0;
    const rad = val * Math.PI / 180;
    const fn = { sin:Math.sin, cos:Math.cos, tan:Math.tan, log:Math.log10, ln:Math.log,
      sqrt:Math.sqrt, cbrt:Math.cbrt, inv:v=>1/v, abs:Math.abs, exp:Math.exp };
    let r = action === 'sqr' ? val*val : action === 'cube' ? val*val*val : fn[action](val);
    r = parseFloat(r.toFixed(10));
    const label = action === 'sqr' ? '²' : action === 'cube' ? '³' : action;
    expression = `${label}(${currentInput}) =`; result = String(r); currentInput = String(r);
    justEvaluated = true;
  } else if (action === 'fact') {
    if (justEvaluated && currentInput) expression = currentInput;
    const n = parseInt(currentInput) || 0;
    const r = factorial(n);
    expression = `${currentInput}! =`; result = String(r); currentInput = String(r);
    justEvaluated = true;
  } else if (action === 'pi') {
    if (justEvaluated) { currentInput = ''; expression = ''; justEvaluated = false; }
    currentInput += Math.PI.toFixed(6); expression += Math.PI.toFixed(6);
  } else if (action === 'e') {
    if (justEvaluated) { currentInput = ''; expression = ''; justEvaluated = false; }
    currentInput += Math.E.toFixed(6); expression += Math.E.toFixed(6);
  } else {
    if (justEvaluated && /[\d.]/.test(action)) { currentInput = ''; expression = ''; }
    justEvaluated = false;
    if (/[+\-*/^]/.test(action)) { expression += ` ${action} `; currentInput += action; }
    else { currentInput += action; expression += action; }
  }
  updateDisplay();
}

buttonsEl.addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (btn) handleAction(btn.dataset.action);
});

document.addEventListener('keydown', e => {
  const keyMap = { Enter:'=', Backspace:'backspace', Delete:'clear', Escape:'clear', '%':'percent' };
  const action = keyMap[e.key] || e.key;
  const all = [...sciBtns];
  if (all.some(b => b.a === action) || /^[\d+\-*/.^()]$/.test(action)) {
    handleAction(action); e.preventDefault();
  }
});

renderButtons();
</script>
</body>
</html>
